<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5f5f0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="다마고치">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>다마고치</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --surface2: #efefea;
  --border: #e0e0d8;
  --accent: #4a9e2f;
  --accent-light: #e8f5e2;
  --accent2: #e03030;
  --text: #1a1a1a;
  --text2: #666;
  --text3: #aaa;
  --radius: 16px;
  --done-bg: #e8f5e2;
  --done-border: #4a9e2f;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overscroll-behavior: none; }

/* LAYOUT */
.app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
.header-title { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 21px; color: var(--accent); letter-spacing: -0.5px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.streak-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 12px; color: var(--text2); }
.streak-badge.on { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
.tab { flex: 1; text-align: center; padding: 12px; font-size: 13px; color: var(--text3); cursor: pointer; transition: color 0.2s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

/* SCROLL AREA */
.page { flex: 1; overflow-y: auto; padding: 20px; display: none; }
.page.active { display: block; }

/* DATE NAV */
.date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.date-nav button { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
.date-nav button:active { background: var(--surface2); }
.date-info { text-align: center; }
.date-main { font-size: 16px; font-weight: 700; color: var(--text); }
.date-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* WEIGHT INPUT */
.weight-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; box-shadow: var(--shadow); }
.weight-label { font-size: 13px; color: var(--text2); }
.weight-input-wrap { display: flex; align-items: center; gap: 6px; }
.weight-input { width: 72px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 16px; color: var(--text); text-align: right; font-family: 'Noto Sans KR', sans-serif; }
.weight-input:focus { outline: none; border-color: var(--accent); }
.weight-unit { font-size: 13px; color: var(--text2); }

/* PROGRESS */
.progress-block { margin-bottom: 16px; }
.progress-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
.progress-pct { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 34px; color: var(--accent); line-height: 1; }
.progress-label { font-size: 12px; color: var(--text2); text-align: right; }
.progress-bar { height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

/* PET */
.pet-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; }
.pet-stage { position: relative; width: 92px; height: 92px; flex: none; margin-top: 18px; cursor: pointer; }
.pet-img { width: 92px; height: 92px; object-fit: contain; transition: filter 0.3s; animation: pet-idle 2.4s ease-in-out infinite; }
.pet-img.mid { filter: none; }
.pet-img.high { filter: saturate(1.3) brightness(1.05); }
.pet-img.low { filter: grayscale(0.55) brightness(0.85); animation: pet-droop 2.4s ease-in-out infinite; }
.pet-img.poke { animation: pet-poke 0.3s ease; }
.pet-bubble { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 10px; width: 148px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 7px 10px; font-size: 11px; line-height: 1.4; color: var(--text2); text-align: center; box-shadow: var(--shadow); z-index: 2; }
.pet-bubble::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--surface2); }
.pet-stats { flex: 1; min-width: 0; }
.pet-level { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 16px; color: var(--accent); margin-bottom: 8px; }
.pet-energy-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: flex; justify-content: space-between; }
.pet-energy-bar { height: 8px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
.pet-energy-fill { height: 100%; background: linear-gradient(90deg, #4a9e2f, #7bc900); border-radius: 999px; transition: width 0.4s; }
@keyframes pet-idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes pet-droop { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(2px) rotate(-3deg); } }
@keyframes pet-poke { 0% { transform: scale(1) rotate(0); } 50% { transform: scale(0.85) rotate(8deg); } 100% { transform: scale(1) rotate(0); } }

/* TASKS */
.tasks-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.task-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; user-select: none; box-shadow: var(--shadow); }
.task-item:active { transform: scale(0.98); }
.task-item.done { background: var(--done-bg); border-color: var(--done-border); }
.task-check { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s; }
.task-item.done .task-check { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
.task-text { flex: 1; }
.task-name { font-size: 14px; font-weight: 500; color: var(--text); }
.task-item.done .task-name { color: var(--accent); }
.task-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }
.task-item.done .task-desc { color: #6aaa40; }

/* SAVE BTN */
.save-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: var(--radius); font-size: 15px; font-weight: 900; color: #fff; cursor: pointer; margin-top: 8px; font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.5px; transition: opacity 0.15s; box-shadow: 0 2px 8px rgba(74,158,47,0.3); }
.save-btn:active { opacity: 0.85; }

/* WEEKLY */
.weekly-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
.week-col { text-align: center; }
.week-day-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; }
.week-dot { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 13px; background: var(--surface); color: var(--text3); }
.week-dot.great { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
.week-dot.ok { background: #fff8e6; color: #b8860b; border-color: #e6c84a; }
.week-dot.bad { background: #fff0f0; color: #cc3333; border-color: #ffaaaa; }
.week-dot.today-ring { box-shadow: 0 0 0 2px var(--accent); }

/* GOAL SECTION */
.section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
.section-card-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.goal-numbers { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.goal-num { text-align: center; }
.goal-num-val { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 24px; color: var(--text); }
.goal-num-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
.goal-arrow { font-size: 20px; color: var(--text3); }
.goal-bar { height: 8px; background: var(--surface2); border-radius: 999px; overflow: hidden; margin-bottom: 8px; }
.goal-fill { height: 100%; background: linear-gradient(90deg, #4a9e2f, #7bc900); border-radius: 999px; transition: width 0.5s; }
.goal-caption { font-size: 12px; color: var(--text2); text-align: center; }

/* INSTALL BANNER */
.install-banner { background: var(--accent-light); border: 1px solid var(--accent); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
.install-icon { font-size: 22px; }
.install-text { flex: 1; font-size: 12px; color: var(--text2); line-height: 1.5; }
.install-btn { background: var(--accent); border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; color: #fff; cursor: pointer; white-space: nowrap; }

.divider { height: 1px; background: var(--border); margin: 20px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">다마고치</div>
    <div class="header-right">
      <div class="streak-badge" id="streakBadge">연속 0일</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('today')">오늘</div>
    <div class="tab" onclick="switchTab('week')">주간</div>
  </div>

  <!-- TODAY PAGE -->
  <div class="page active" id="page-today">
    <div id="installBanner" class="install-banner" style="display:none">
      <div class="install-icon">📱</div>
      <div class="install-text">홈 화면에 추가하면<br>앱처럼 쓸 수 있다.</div>
      <button class="install-btn" id="installBtn">추가하기</button>
    </div>

    <div class="date-nav">
      <button onclick="changeDay(-1)">‹</button>
      <div class="date-info">
        <div class="date-main" id="dateMain"></div>
        <div class="date-sub" id="dateSub"></div>
      </div>
      <button onclick="changeDay(1)" id="nextBtn">›</button>
    </div>

    <div class="pet-card" id="petCard">
      <div class="pet-stage" onclick="pokePet()">
        <div class="pet-bubble" id="petBubble">미션을 체크하면 반응한다.</div>
        <img src="icon-512.png" class="pet-img mid" id="petImg" alt="펫">
      </div>
      <div class="pet-stats">
        <div class="pet-level" id="petLevel">Lv.1</div>
        <div class="pet-energy-label"><span>기력</span><span id="petEnergyPct">0%</span></div>
        <div class="pet-energy-bar"><div class="pet-energy-fill" id="petEnergyFill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="weight-block">
      <span class="weight-label">오늘 몸무게</span>
      <div class="weight-input-wrap">
        <input class="weight-input" type="number" id="weightInput" placeholder="--" step="0.1" min="30" max="200" inputmode="decimal">
        <span class="weight-unit">kg</span>
      </div>
    </div>

    <div class="progress-block">
      <div class="progress-top">
        <div class="progress-pct" id="progressPct">0%</div>
        <div class="progress-label" id="progressLabel">0 / 6 완료</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="tasks-title">오늘의 미션</div>
    <div id="tasksContainer"></div>

    <button class="save-btn" onclick="saveToday()">저장</button>
  </div>

  <!-- WEEK PAGE -->
  <div class="page" id="page-week">
    <div class="tasks-title" style="margin-bottom:14px">이번 주 현황</div>
    <div class="weekly-grid" id="weeklyGrid"></div>

    <div class="section-card">
      <div class="section-card-title">감량 목표</div>
      <div class="goal-numbers">
        <div class="goal-num">
          <div class="goal-num-val" id="startW">--</div>
          <div class="goal-num-label">시작</div>
        </div>
        <div class="goal-arrow">→</div>
        <div class="goal-num">
          <div class="goal-num-val" id="currentW" style="color:var(--accent)">--</div>
          <div class="goal-num-label">현재</div>
        </div>
        <div class="goal-arrow">→</div>
        <div class="goal-num">
          <div class="goal-num-val">58</div>
          <div class="goal-num-label">목표</div>
        </div>
      </div>
      <div class="goal-bar">
        <div class="goal-fill" id="goalFill" style="width:0%"></div>
      </div>
      <div class="goal-caption" id="goalCaption">몸무게를 입력하면 진행률이 표시된다.</div>
    </div>

    <div class="section-card">
      <div class="section-card-title">최근 7일 기록</div>
      <div id="recentList"></div>
    </div>
  </div>
</div>

<script>
const TASKS = [
  { id: "exercise",  name: "퇴근 직후 운동",  desc: "칼소폭 등 2Set" },
  { id: "eat_small", name: "소식",             desc: "먹자마자 양치하기" },
  { id: "stretch",   name: "스트레칭",         desc: "다노 / 폼롤러" },
  { id: "read",      name: "독서",             desc: "최소 30p 읽기" },
  { id: "water",     name: "물 2L",            desc: "하루 종일 나눠 마시기" },
  { id: "clean_eat", name: "당 줄이기",        desc: "과자, 아이스크림, 빵, 배달, 액상과당 줄이기" },
];

const PET_LINES = {
  100: ["기력 완전 충전! 최고의 하루였어", "배 두둑해~ 내일도 이렇게 채워줘", "이 정도면 레벨업 각인데?"],
  high: ["오늘 꽤 잘 챙겨줬네, 고마워", "조금만 더 채우면 완충인데!"],
  mid: ["나쁘진 않은데... 기력이 애매해", "반쯈 채워졌어, 더 줘봐"],
  low: ["배고파... 기력이 빠지고 있어", "오늘 좀 부족한 것 같은데"],
  zero: ["기력이 텅텅... 살려줘", "오늘 진짜 아무것도 안 줬네"],
};

// 하루에 한 번만 대사를 뽑아서 캐싱 (체크할 때마다 바뀌지 않게)
const petBubbleCache = {};
function getPetLine(pct, dateKey) {
  const bucket = pct >= 100 ? "100" : pct >= 71 ? "high" : pct >= 43 ? "mid" : pct > 0 ? "low" : "zero";
  const cacheKey = dateKey + "_" + bucket;
  if (!petBubbleCache[cacheKey]) {
    const arr = PET_LINES[bucket] || PET_LINES.low;
    petBubbleCache[cacheKey] = arr[Math.floor(Math.random() * arr.length)];
  }
  return petBubbleCache[cacheKey];
}

const POKE_LINES = ["뭐야 왜 찔러", "흐엥 놀라라", "기력 충전 중...", "쓰다듬어줘서 좋아"];
let pokeTimer;
function pokePet() {
  const bubble = document.getElementById("petBubble");
  const img = document.getElementById("petImg");
  clearTimeout(pokeTimer);
  bubble.textContent = POKE_LINES[Math.floor(Math.random() * POKE_LINES.length)];
  img.classList.remove("poke"); void img.offsetWidth; img.classList.add("poke");
  pokeTimer = setTimeout(updateProgress, 1500); // 1.5초 후 원래 상태 멘트로 복귀
}

let data = {};
let currentOffset = 0;

function dateKey(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0, 10);
}
function formatDate(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  const days = ["일","월","화","수","목","금","토"];
  const today = offset === 0, yesterday = offset === -1;
  const tag = today ? " (오늘)" : yesterday ? " (어제)" : "";
  return { main: `${d.getMonth()+1}월 ${d.getDate()}일${tag}`, sub: days[d.getDay()] + "요일" };
}

// 수정 1: localStorage 키 diet2026으로 변경
function load() { try { data = JSON.parse(localStorage.getItem("diet2026") || "{}"); } catch(e) { data = {}; } }
function save() { try { localStorage.setItem("diet2026", JSON.stringify(data)); } catch(e) {} }
function getDay(offset = currentOffset) {
  const k = dateKey(offset);
  if (!data[k]) data[k] = { tasks: {}, weight: null };
  return data[k];
}

function renderTasks() {
  const day = getDay();
  const container = document.getElementById("tasksContainer");
  container.innerHTML = TASKS.map(t => {
    const done = !!day.tasks[t.id];
    return `<div class="task-item${done?" done":""}" onclick="toggleTask('${t.id}')">
      <div class="task-check">${done?"✓":""}</div>
      <div class="task-text">
        <div class="task-name">${t.name}</div>
        <div class="task-desc">${t.desc}</div>
      </div>
    </div>`;
  }).join("");
  updateProgress();
}

function toggleTask(id) {
  const day = getDay();
  day.tasks[id] = !day.tasks[id];
  save();
  renderTasks();
  // 수정 6: 태스크 체크 시 주간 탭도 즉시 갱신 (이미 열려있는 경우)
  if (document.getElementById("page-week").classList.contains("active")) {
    renderWeekly(); renderGoal();
  }
}

function updateProgress() {
  const day = getDay();
  const done = Object.values(day.tasks).filter(Boolean).length;
  const pct = Math.round(done / TASKS.length * 100);
  document.getElementById("progressPct").textContent = pct + "%";
  document.getElementById("progressLabel").textContent = `${done} / ${TASKS.length} 완료`;
  document.getElementById("progressFill").style.width = pct + "%";
  renderPet(done, pct);
}

// 펫의 기력 = 보고있는 날짜의 미션 완료율 (체크할수록 즉시 반응, 안 하면 시무룩)
function renderPet(done, pct) {
  document.getElementById("petEnergyPct").textContent = pct + "%";
  document.getElementById("petEnergyFill").style.width = pct + "%";

  const img = document.getElementById("petImg");
  img.classList.remove("low", "mid", "high");
  img.classList.add(pct >= 70 ? "high" : pct >= 40 ? "mid" : "low");

  const bubble = document.getElementById("petBubble");
  bubble.textContent = done > 0 ? getPetLine(pct, dateKey(currentOffset)) : "미션을 체크하면 반응한다.";

  renderPetLevel();
}

// 펫 레벨 = 지금까지 누적 완료한 미션 총량 기준 (절대 줄지 않는 성장치)
const EXP_PER_LEVEL = 15;
function getTotalExp() {
  let total = 0;
  for (const k in data) {
    const d = data[k];
    if (d && d.tasks) total += Object.values(d.tasks).filter(Boolean).length;
  }
  return total;
}
function renderPetLevel() {
  const lv = 1 + Math.floor(getTotalExp() / EXP_PER_LEVEL);
  document.getElementById("petLevel").textContent = `Lv.${lv}`;
}

function saveToday() {
  const w = parseFloat(document.getElementById("weightInput").value);
  const day = getDay();
  if (!isNaN(w) && w > 30 && w < 200) {
    day.weight = w;
    if (!data._startWeight) data._startWeight = w;
  }
  save();
  renderWeekly();
  renderGoal();
  renderStreak();
  const btn = document.querySelector(".save-btn");
  btn.textContent = "저장 완료 ✓";
  setTimeout(() => btn.textContent = "저장", 1500);
}

function changeDay(delta) {
  if (currentOffset + delta > 0) return;
  currentOffset += delta;
  document.getElementById("nextBtn").style.opacity = currentOffset === 0 ? "0.3" : "1";
  const { main, sub } = formatDate(currentOffset);
  document.getElementById("dateMain").textContent = main;
  document.getElementById("dateSub").textContent = sub;
  const day = getDay();
  document.getElementById("weightInput").value = day.weight || "";
  renderTasks();
}

// 수정 8: streak은 항상 오늘(offset=0) 기준으로 계산
function calcStreak() {
  let s = 0;
  for (let i = 0; i >= -365; i--) {
    const k = dateKey(i); // 항상 오늘 기준
    const d = data[k];
    if (!d) break;
    const done = Object.values(d.tasks || {}).filter(Boolean).length;
    if ((done / TASKS.length) >= 0.7) s++;
    else break;
  }
  return s;
}

function renderStreak() {
  const s = calcStreak();
  const badge = document.getElementById("streakBadge");
  badge.textContent = s > 0 ? `🔥 연속 ${s}일` : `연속 ${s}일`;
  badge.className = "streak-badge" + (s > 0 ? " on" : "");
}

function renderWeekly() {
  const el = document.getElementById("weeklyGrid");
  const days = ["일","월","화","수","목","금","토"];
  el.innerHTML = Array.from({length:7},(_,i)=>i-6).map(i => {
    const d = new Date(); d.setDate(d.getDate() + i);
    const k = d.toISOString().slice(0,10);
    const dn = days[d.getDay()];
    const dd = data[k];
    let cls = "", label = "·";
    if (dd) {
      const done = Object.values(dd.tasks||{}).filter(Boolean).length;
      const pct = done / TASKS.length;
      if (pct >= 0.85) { cls = "great"; label = "✓"; }
      else if (pct >= 0.5) { cls = "ok"; label = "△"; }
      else { cls = "bad"; label = "✗"; }
    }
    if (i === 0) cls += (cls ? " " : "") + "today-ring";
    return `<div class="week-col"><div class="week-day-label">${dn}</div><div class="week-dot ${cls}">${label}</div></div>`;
  }).join("");

  const list = document.getElementById("recentList");
  list.innerHTML = Array.from({length:7},(_,i)=>i-6).reverse().map(i => {
    const d = new Date(); d.setDate(d.getDate() + i);
    const k = d.toISOString().slice(0,10);
    const dd = data[k];
    const done = dd ? Object.values(dd.tasks||{}).filter(Boolean).length : 0;
    const pct = Math.round(done/TASKS.length*100);
    const w = dd && dd.weight ? dd.weight + "kg" : "--";
    const color = pct >= 85 ? "var(--accent)" : pct >= 50 ? "#b8860b" : pct > 0 ? "#cc3333" : "var(--text3)";
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--text2)">${k.slice(5)}</span>
      <span style="color:var(--text2)">${w}</span>
      <span style="color:${color};font-weight:700">${dd ? pct+"%" : "-"}</span>
    </div>`;
  }).join("");
  renderStreak();
}

function renderGoal() {
  const START = data._startWeight || 63;
  const GOAL = 58;
  const weights = Object.entries(data).filter(([k,v])=>k.match(/^\d{4}/)&&v&&v.weight).sort(([a],[b])=>a.localeCompare(b));
  const latest = weights.length ? weights[weights.length-1][1].weight : START;
  const lost = Math.max(0, START - latest);
  const total = START - GOAL;
  const pct = Math.min(100, Math.round(lost/total*100));
  document.getElementById("startW").textContent = START + "kg";
  document.getElementById("currentW").textContent = latest + "kg";
  document.getElementById("goalFill").style.width = pct + "%";
  document.getElementById("goalCaption").textContent = `${lost.toFixed(1)}kg 감량 / 목표 ${total}kg (${pct}%)`;
}

// 수정 3: 탭 배열에서 'plan' 제거
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", ["today","week"][i]===tab));
  document.querySelectorAll(".page").forEach(p => p.classList.toggle("active", p.id==="page-"+tab));
  if (tab === "week") { renderWeekly(); renderGoal(); }
}

// 수정 5: PWA .userChoice 버그 수정
let deferredPrompt;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById("installBanner").style.display = "flex";
});
document.getElementById("installBtn").addEventListener("click", () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      document.getElementById("installBanner").style.display = "none";
      deferredPrompt = null;
    });
  }
});

document.getElementById("nextBtn").style.opacity = "0.3";
const todayData = getDay();
document.getElementById("weightInput").value = todayData.weight || "";
renderTasks();
renderStreak();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
