<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fffaf4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="냉장고 요리사">
<title>냉장고 요리사</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fffaf4;
  --surface: #ffffff;
  --surface2: #fdf5e8;
  --border: #ede4d4;
  --accent: #e8622a;
  --accent2: #f5a623;
  --text: #1a1208;
  --text2: #7a6a52;
  --text3: #b5a48a;
  --radius: 18px;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overscroll-behavior: none; }

.app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* HEADER */
.header { padding: 20px 20px 14px; background: var(--bg); border-bottom: 1px solid var(--border); }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
.logo { font-family: 'Gmarket Sans', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); }
.logo span { color: var(--text); }
.header-sub { font-size: 12px; color: var(--text3); }

/* TABS */
.tabs { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); }
.tab { flex: 1; text-align: center; padding: 11px; font-size: 13px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; transition: color 0.2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* PAGES */
.page { flex: 1; overflow-y: auto; padding: 18px; display: none; }
.page.active { display: block; }

/* SECTION LABEL */
.sec-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

/* INGREDIENT INPUT */
.ingredient-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; box-shadow: var(--shadow); }
.ingredient-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.ingredient-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; font-size: 14px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; }
.ingredient-input:focus { outline: none; border-color: var(--accent); }
.add-btn { background: var(--accent); border: none; border-radius: 10px; padding: 9px 14px; font-size: 14px; color: white; cursor: pointer; font-weight: 700; white-space: nowrap; }
.add-btn:active { opacity: 0.85; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
.tag { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px 4px 12px; font-size: 13px; color: var(--text2); }
.tag-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.tag-del:hover { color: var(--accent); }
.no-tags { font-size: 13px; color: var(--text3); padding: 4px 0; }

/* SAVE ROW */
.save-row { display: flex; gap: 8px; margin-bottom: 16px; }
.save-row button { flex: 1; padding: 11px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; font-family: 'Noto Sans KR', sans-serif; }
.save-row button:active { opacity: 0.8; }
.btn-save { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text2); }
.btn-load { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text2); }
.btn-recommend { background: var(--accent); border: none; color: white; flex: 2 !important; }

/* LOADING */
.loading { text-align: center; padding: 40px 20px; }
.loading-icon { font-size: 36px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text2); }

/* RECIPE CARD */
.recipe-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.15s; }
.recipe-card:active { transform: scale(0.99); }
.recipe-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.recipe-name { font-family: 'Gmarket Sans', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; }
.fav-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0; flex-shrink: 0; }
.recipe-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
.badge-diff-easy { background: #e8f5e9; color: #2e7d32; }
.badge-diff-mid { background: #fff8e1; color: #f57f17; }
.badge-diff-hard { background: #fce4ec; color: #c62828; }
.badge-time { background: var(--surface2); color: var(--text2); }
.badge-micro { background: #e3f2fd; color: #1565c0; }
.health-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.health-label { font-size: 12px; color: var(--text3); }
.stars { font-size: 14px; letter-spacing: 1px; }
.health-reason { font-size: 11px; color: var(--text3); }
.recipe-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
.recipe-ingredients { font-size: 12px; color: var(--text3); }
.recipe-ingredients span { color: var(--accent); font-weight: 500; }

/* DETAIL MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 20px; width: 100%; max-width: 430px; max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-family: 'Gmarket Sans', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.step-list { margin-bottom: 16px; }
.step { display: flex; gap: 12px; margin-bottom: 12px; }
.step-num { width: 24px; height: 24px; min-width: 24px; border-radius: 50%; background: var(--accent); color: white; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
.step-text { font-size: 14px; color: var(--text2); line-height: 1.6; }
.modal-close { width: 100%; padding: 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; font-size: 14px; font-weight: 700; color: var(--text2); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

/* FAVORITES */
.empty-state { text-align: center; padding: 50px 20px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: var(--text3); line-height: 1.6; }

/* SAVED PRESETS */
.preset-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.preset-name { font-size: 14px; font-weight: 500; color: var(--text); }
.preset-count { font-size: 12px; color: var(--text3); }
.preset-btns { display: flex; gap: 6px; }
.preset-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--text2); cursor: pointer; }
.preset-btn.del { color: var(--accent); }

.divider { height: 1px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">🍳 냉장고<span>요리사</span></div>
    </div>
    <div class="header-sub">재료 넣으면 레시피 뽑아준다 — 전자렌지 이하만</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('home')">레시피 찾기</div>
    <div class="tab" onclick="switchTab('fav')">즐겨찾기</div>
    <div class="tab" onclick="switchTab('preset')">재료 저장</div>
  </div>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="sec-label">내 재료</div>
    <div class="ingredient-box">
      <div class="ingredient-input-row">
        <input class="ingredient-input" id="ingInput" placeholder="재료 입력 (예: 계란, 두부...)" onkeydown="if(event.key==='Enter')addIng()">
        <button class="add-btn" onclick="addIng()">추가</button>
      </div>
      <div class="tags-wrap" id="tagsWrap">
        <span class="no-tags">재료를 추가해라</span>
      </div>
    </div>

    <div class="save-row">
      <button class="btn-save" onclick="showSavePreset()">재료 저장</button>
      <button class="btn-load" onclick="switchTab('preset')">불러오기</button>
      <button class="btn-recommend" onclick="getRecipes()">🍽️ 레시피 추천받기</button>
    </div>

    <div id="recipeArea"></div>
  </div>

  <!-- FAVORITES -->
  <div class="page" id="page-fav">
    <div class="sec-label">저장한 레시피</div>
    <div id="favList"></div>
  </div>

  <!-- PRESETS -->
  <div class="page" id="page-preset">
    <div class="sec-label">저장된 재료 목록</div>
    <div id="presetList"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="step-list" id="modalSteps"></div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
let ingredients = [];
let recipes = [];
let favorites = JSON.parse(localStorage.getItem("recipe_favs") || "[]");
let presets = JSON.parse(localStorage.getItem("recipe_presets") || "[]");

function save() {
  localStorage.setItem("recipe_favs", JSON.stringify(favorites));
  localStorage.setItem("recipe_presets", JSON.stringify(presets));
}

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["home","fav","preset"][i]===tab));
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id==="page-"+tab));
  if(tab==="fav") renderFavs();
  if(tab==="preset") renderPresets();
}

function addIng() {
  const input = document.getElementById("ingInput");
  const val = input.value.trim();
  if(!val) return;
  const items = val.split(/[,，、\s]+/).filter(Boolean);
  items.forEach(v => { if(!ingredients.includes(v)) ingredients.push(v); });
  input.value = "";
  renderTags();
}

function removeIng(ing) {
  ingredients = ingredients.filter(i=>i!==ing);
  renderTags();
}

function renderTags() {
  const wrap = document.getElementById("tagsWrap");
  if(!ingredients.length) { wrap.innerHTML = '<span class="no-tags">재료를 추가해라</span>'; return; }
  wrap.innerHTML = ingredients.map(ing=>`
    <div class="tag">${ing}<button class="tag-del" onclick="removeIng('${ing}')">×</button></div>
  `).join("");
}

async function getRecipes() {
  if(!ingredients.length) { alert("재료를 먼저 입력해라."); return; }
  const area = document.getElementById("recipeArea");
  area.innerHTML = `<div class="loading"><div class="loading-icon">🍳</div><div class="loading-text">레시피 찾는 중...</div></div>`;

  const prompt = `너는 요리 전문가다. 아래 재료들로 만들 수 있는 점심 도시락 또는 저녁 식단 레시피 3가지를 추천해라.

조건:
- 불 사용 금지. 전자렌지 또는 조리 없이 먹을 수 있는 것만
- 주어진 재료를 최대한 활용
- 간단하고 실용적인 레시피

재료: ${ingredients.join(", ")}

반드시 아래 JSON 배열 형식으로만 응답해라. 다른 텍스트 절대 포함하지 마라:
[
  {
    "name": "레시피 이름",
    "difficulty": "쉬움 or 보통 or 어려움",
    "time": "5분 or 10분 or 15분",
    "needMicrowave": true or false,
    "healthStars": 1~5 숫자,
    "healthReason": "별점 이유 한 줄 (예: 단백질 풍부, 채소 부족 등)",
    "desc": "레시피 한 줄 소개",
    "usedIngredients": ["사용한재료1", "사용한재료2"],
    "steps": ["1단계 설명", "2단계 설명", "3단계 설명"]
  }
]`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
    recipes = JSON.parse(text);
    renderRecipes(recipes, "recipeArea");
  } catch(e) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">😵</div><div class="empty-text">레시피 불러오기 실패.<br>다시 시도해라.</div></div>`;
  }
}

function renderRecipes(list, targetId, isFav=false) {
  const el = document.getElementById(targetId);
  if(!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">${isFav?"🤍":"🥺"}</div><div class="empty-text">${isFav?"저장한 레시피가 없다.":"레시피가 없다."}</div></div>`;
    return;
  }
  el.innerHTML = list.map((r,i)=>{
    const isFaved = favorites.some(f=>f.name===r.name);
    const diffClass = r.difficulty==="쉬움"?"easy":r.difficulty==="보통"?"mid":"hard";
    const stars = "★".repeat(r.healthStars)+"☆".repeat(5-r.healthStars);
    const idx = isFav ? `fav-${i}` : i;
    return `<div class="recipe-card" onclick="openModal(${isFav?`favorites[${i}]`:`recipes[${i}]`})">
      <div class="recipe-header">
        <div class="recipe-name">${r.name}</div>
        <button class="fav-btn" onclick="event.stopPropagation();toggleFav(${isFav?`favorites[${i}]`:`recipes[${i}]`},this)">${isFaved?"❤️":"🤍"}</button>
      </div>
      <div class="recipe-badges">
        <span class="badge badge-diff-${diffClass}">${r.difficulty}</span>
        <span class="badge badge-time">⏱ ${r.time}</span>
        ${r.needMicrowave?'<span class="badge badge-micro">📡 전자렌지</span>':'<span class="badge badge-micro">🥄 조리 불필요</span>'}
      </div>
      <div class="health-row">
        <span class="health-label">건강별점</span>
        <span class="stars" style="color:var(--accent2)">${stars}</span>
        <span class="health-reason">${r.healthReason}</span>
      </div>
      <div class="recipe-desc">${r.desc}</div>
      <div class="recipe-ingredients">사용 재료: <span>${(r.usedIngredients||[]).join(", ")}</span></div>
    </div>`;
  }).join("");
}

function toggleFav(recipe, btn) {
  const idx = favorites.findIndex(f=>f.name===recipe.name);
  if(idx>=0) { favorites.splice(idx,1); btn.textContent="🤍"; }
  else { favorites.push(recipe); btn.textContent="❤️"; }
  save();
}

function openModal(recipe) {
  document.getElementById("modalTitle").textContent = recipe.name;
  document.getElementById("modalSteps").innerHTML = (recipe.steps||[]).map((s,i)=>`
    <div class="step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>
  `).join("");
  document.getElementById("modalOverlay").style.display="flex";
}

function closeModal(e) {
  if(!e || e.target===document.getElementById("modalOverlay")) {
    document.getElementById("modalOverlay").style.display="none";
  }
}

function renderFavs() {
  renderRecipes(favorites, "favList", true);
}

function showSavePreset() {
  if(!ingredients.length) { alert("저장할 재료가 없다."); return; }
  const name = prompt("재료 목록 이름을 입력해라 (예: 기본 재료, 주간 재료):");
  if(!name) return;
  presets.push({ name, items: [...ingredients] });
  save();
  alert("저장 완료!");
}

function renderPresets() {
  const el = document.getElementById("presetList");
  if(!presets.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">저장된 재료 목록이 없다.<br>레시피 찾기 탭에서 재료 저장해라.</div></div>`;
    return;
  }
  el.innerHTML = presets.map((p,i)=>`
    <div class="preset-item">
      <div>
        <div class="preset-name">${p.name}</div>
        <div class="preset-count">${p.items.join(", ")}</div>
      </div>
      <div class="preset-btns">
        <button class="preset-btn" onclick="loadPreset(${i})">불러오기</button>
        <button class="preset-btn del" onclick="deletePreset(${i})">삭제</button>
      </div>
    </div>
  `).join("");
}

function loadPreset(i) {
  ingredients = [...presets[i].items];
  renderTags();
  switchTab("home");
}

function deletePreset(i) {
  presets.splice(i,1);
  save();
  renderPresets();
}
</script>
</body>
</html>
