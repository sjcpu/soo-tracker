<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4F46E5">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <title>내 투자 포트폴리오</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    :root {
      --bg: #ffffff;
      --surface: #f8f7ff;
      --surface2: #f1f0fe;
      --border: #e8e6fd;
      --text: #18181b;
      --text-sub: #6b7280;
      --text-muted: #a1a1aa;
      --primary: #4F46E5;
      --primary-light: #ede9fe;
      --primary-mid: #c4b5fd;
      --green: #10b981;
      --green-light: #d1fae5;
      --red: #ef4444;
      --red-light: #fee2e2;
      --orange: #f59e0b;
      --orange-light: #fef3c7;
      --shadow-sm: 0 1px 3px rgba(79,70,229,0.08), 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 4px 16px rgba(79,70,229,0.10), 0 1px 4px rgba(0,0,0,0.05);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top) 20px 0;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 0;
    }
    .header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    .header-title span { color: var(--primary); }
    .header-badge {
      font-size: 11px; font-weight: 700;
      background: var(--red); color: #fff;
      border-radius: 20px; padding: 3px 10px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

    /* ── TAB NAV ── */
    .tab-nav {
      display: flex;
      gap: 2px;
      padding: 10px 0 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1;
      min-width: 64px;
      padding: 8px 4px 10px;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: all 0.18s;
      white-space: nowrap;
      font-family: inherit;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* ── CONTENT ── */
    .content {
      padding: 20px 16px 100px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ── TOTAL CARD ── */
    .total-card {
      background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
      border-radius: var(--radius);
      padding: 22px 20px;
      color: #fff;
      margin-bottom: 6px;
      position: relative;
      overflow: hidden;
    }
    .total-card::before {
      content: '';
      position: absolute;
      right: -20px; top: -20px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .total-card::after {
      content: '';
      position: absolute;
      right: 20px; bottom: -30px;
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .total-label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
    .total-amount { font-size: 30px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
    .total-amount sup { font-size: 14px; font-weight: 600; margin-left: 2px; opacity: 0.8; }
    .total-meta { display: flex; gap: 16px; font-size: 12px; opacity: 0.85; }
    .total-pnl { font-weight: 700; font-size: 13px; }

    /* ── ACCOUNT GRID ── */
    .account-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .account-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: var(--shadow-sm);
    }
    .account-card:active { transform: scale(0.97); }
    .account-icon { font-size: 22px; margin-bottom: 6px; }
    .account-name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
    .account-type { font-size: 10px; font-weight: 600; border-radius: 6px; padding: 2px 7px; display: inline-block; margin-bottom: 8px; }
    .account-amount { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 2px; }
    .account-pnl { font-size: 11px; font-weight: 700; }
    .account-count { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    /* ── SECTOR BAR ── */
    .sector-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .sector-row { margin-bottom: 12px; }
    .sector-row:last-child { margin-bottom: 0; }
    .sector-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .sector-name { font-size: 13px; font-weight: 600; }
    .sector-pct { font-size: 12px; font-weight: 700; }
    .sector-bar-bg { height: 7px; background: var(--surface); border-radius: 4px; overflow: hidden; }
    .sector-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

    /* ── DUPLICATE WARNING ── */
    .dup-card {
      background: #fff8f8;
      border: 1.5px solid #fecaca;
      border-radius: var(--radius);
      padding: 16px;
    }
    .dup-title { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .dup-item { margin-bottom: 10px; }
    .dup-item:last-child { margin-bottom: 0; }
    .dup-item-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .dup-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sub); padding: 2px 0 2px 10px; }

    /* ── HOLDINGS LIST ── */
    .holding-item {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.15s;
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .holding-item:active { transform: scale(0.98); box-shadow: none; }
    .holding-item.dup { border-color: #fca5a5; background: #fff8f8; }
    .holding-dup-badge {
      position: absolute; top: 10px; right: 12px;
      font-size: 10px; font-weight: 700;
      color: var(--red); background: var(--red-light);
      border-radius: 6px; padding: 2px 7px;
    }
    .holding-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
    .holding-name { font-size: 14px; font-weight: 700; }
    .holding-ticker { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .holding-pnl-pct { font-size: 15px; font-weight: 800; }
    .holding-tags { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .holding-tag {
      font-size: 10px; font-weight: 700;
      border-radius: 6px; padding: 2px 8px;
    }
    .holding-bottom { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); }
    .holding-amount { font-size: 13px; font-weight: 700; color: var(--text); }

    .del-btn {
      position: absolute; bottom: 12px; right: 14px;
      font-size: 11px; font-weight: 600;
      background: #fee2e2; color: var(--red);
      border: none; border-radius: 7px;
      padding: 4px 10px; cursor: pointer;
      font-family: inherit;
    }

    /* ── ADD BUTTON ── */
    .fab {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 80px);
      right: 20px;
      width: 52px; height: 52px;
      background: var(--primary);
      color: #fff;
      border: none; border-radius: 50%;
      font-size: 24px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(79,70,229,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 40;
      font-family: inherit;
    }
    .fab:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(79,70,229,0.3); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 50;
    }
    .nav-btn {
      flex: 1; border: none; background: transparent;
      padding: 10px 4px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .nav-btn:active { opacity: 0.6; }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--text-muted); }
    .nav-btn.active .nav-label { color: var(--primary); }
    .nav-btn.active .nav-icon { filter: none; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: var(--bg);
      border-radius: 22px 22px 0 0;
      padding: 24px 20px calc(env(safe-area-inset-bottom) + 20px);
      width: 100%; max-width: 480px; margin: 0 auto;
      transform: translateY(40px);
      transition: transform 0.25s cubic-bezier(.4,0,.2,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 18px; }
    .modal-input {
      width: 100%; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 11px 14px;
      font-size: 14px; font-family: inherit;
      background: var(--surface); color: var(--text);
      margin-bottom: 10px; outline: none;
      transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: var(--primary); background: var(--bg); }
    .modal-select {
      width: 100%; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 11px 14px;
      font-size: 14px; font-family: inherit;
      background: var(--surface); color: var(--text);
      margin-bottom: 16px; outline: none; appearance: none;
      transition: border-color 0.15s;
    }
    .modal-select:focus { border-color: var(--primary); }
    .modal-btns { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; padding: 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); background: var(--bg);
      font-size: 14px; font-weight: 700; color: var(--text-sub);
      cursor: pointer; font-family: inherit;
    }
    .btn-confirm {
      flex: 2; padding: 14px;
      border: none; border-radius: var(--radius-sm);
      background: var(--primary); color: #fff;
      font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-confirm:active { opacity: 0.85; }

    /* ── AI TAB ── */
    .ai-banner {
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .ai-emoji { font-size: 38px; margin-bottom: 10px; display: block; }
    .ai-banner-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
    .ai-banner-sub { font-size: 12px; color: var(--text-sub); line-height: 1.6; margin-bottom: 18px; }
    .ai-start-btn {
      background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius-sm);
      padding: 13px 32px; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s, transform 0.12s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .ai-start-btn:active { opacity: 0.85; transform: scale(0.97); }
    .ai-start-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    .ai-section { margin-bottom: 14px; }
    .ai-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow-sm);
    }
    .ai-card-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .ai-card-text { font-size: 13px; line-height: 1.7; color: var(--text); }

    .action-chip {
      display: inline-block;
      font-size: 11px; font-weight: 800;
      border-radius: 8px; padding: 4px 10px;
      margin-right: 8px; color: #fff;
    }
    .action-row {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
    }
    .action-top { display: flex; align-items: center; margin-bottom: 6px; }
    .action-target { font-size: 14px; font-weight: 700; }
    .action-reason { font-size: 12px; color: var(--text-sub); line-height: 1.6; }

    .risk-row {
      font-size: 12px; color: var(--text);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.6;
    }
    .risk-row:last-child { border-bottom: none; }

    /* ── STOCK AI SHEET ── */
    .stock-action-pill {
      display: inline-block;
      font-size: 17px; font-weight: 800;
      border-radius: 12px; padding: 8px 22px;
      color: #fff; margin-right: 12px;
    }
    .confidence-bar-bg {
      flex: 1; height: 6px;
      background: var(--surface2);
      border-radius: 3px; overflow: hidden;
    }
    .confidence-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.5s;
    }
    .stock-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .stock-info-box {
      border-radius: var(--radius-sm);
      padding: 12px;
    }
    .stock-info-box-label { font-size: 10px; font-weight: 700; margin-bottom: 4px; }
    .stock-info-box-text { font-size: 12px; line-height: 1.5; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 90px);
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1a1a2e; color: #fff;
      padding: 10px 20px; border-radius: 30px;
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 48px 20px;
      color: var(--text-muted);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state-text { font-size: 14px; line-height: 1.6; }

    /* ── UP/DOWN COLORS ── */
    .up { color: var(--green); }
    .down { color: var(--red); }
    .neutral { color: var(--text-muted); }

    /* ── ACCOUNT TAB ── */
    .acct-detail-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .acct-detail-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .acct-detail-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .acct-detail-name { font-size: 15px; font-weight: 700; }
    .acct-detail-type { font-size: 11px; font-weight: 600; margin-top: 1px; }
    .acct-detail-amounts { margin-left: auto; text-align: right; }
    .acct-detail-cur { font-size: 16px; font-weight: 800; }
    .acct-detail-pnl { font-size: 12px; font-weight: 700; margin-top: 1px; }
    .acct-holding-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s;
    }
    .acct-holding-row:last-child { border-bottom: none; }
    .acct-holding-row:active { background: var(--surface); }
    .acct-h-name { font-size: 13px; font-weight: 600; }
    .acct-h-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .acct-h-pnl { font-size: 13px; font-weight: 700; }
    .acct-h-cur { font-size: 12px; color: var(--text-sub); margin-top: 1px; text-align: right; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-title">내 <span>포트폴리오</span></div>
    <div id="dupBadge" class="header-badge" style="display:none"></div>
  </div>
  <nav class="tab-nav" id="tabNav">
    <button class="tab-btn active" data-tab="overview">개요</button>
    <button class="tab-btn" data-tab="accounts">계좌별</button>
    <button class="tab-btn" data-tab="holdings">종목목록</button>
    <button class="tab-btn" data-tab="ai">AI 분석</button>
  </nav>
</div>

<!-- CONTENT PAGES -->
<div class="content" id="page-overview"></div>
<div class="content" id="page-accounts" style="display:none"></div>
<div class="content" id="page-holdings" style="display:none"></div>
<div class="content" id="page-ai" style="display:none"></div>

<!-- FAB (종목 추가) -->
<button class="fab" id="fabBtn" title="종목 추가">＋</button>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" data-tab="overview">
    <span class="nav-icon">📊</span>
    <span class="nav-label">개요</span>
  </button>
  <button class="nav-btn" data-tab="accounts">
    <span class="nav-icon">🏦</span>
    <span class="nav-label">계좌</span>
  </button>
  <button class="nav-btn" data-tab="holdings">
    <span class="nav-icon">📋</span>
    <span class="nav-label">종목</span>
  </button>
  <button class="nav-btn" data-tab="ai">
    <span class="nav-icon">🤖</span>
    <span class="nav-label">AI</span>
  </button>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal-sheet" id="addSheet">
    <div class="modal-title">종목 추가</div>
    <input class="modal-input" id="inp-ticker" placeholder="티커/코드 (예: 005930)">
    <input class="modal-input" id="inp-name" placeholder="종목명 (예: 삼성전자)">
    <input class="modal-input" id="inp-sector" placeholder="섹터 (예: 반도체)">
    <input class="modal-input" id="inp-qty" type="number" placeholder="보유 수량">
    <input class="modal-input" id="inp-avg" type="number" placeholder="평균 매수가 (원)">
    <input class="modal-input" id="inp-cur" type="number" placeholder="현재가 (원)">
    <select class="modal-select" id="inp-account">
      <option value="toss">📱 토스증권 (직투)</option>
      <option value="samsung">🏦 삼성증권 IRP (퇴직연금)</option>
      <option value="namu">🌿 나무증권 ISA (절세계좌)</option>
      <option value="mirae">🔥 미래에셋 CMA</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" id="addCancel">취소</button>
      <button class="btn-confirm" id="addConfirm">추가하기</button>
    </div>
  </div>
</div>

<!-- STOCK AI MODAL -->
<div class="modal-overlay" id="stockModal">
  <div class="modal-sheet" id="stockSheet">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div>
        <div class="modal-title" id="stockModalName" style="margin-bottom:3px"></div>
        <div style="font-size:12px;color:var(--text-sub)" id="stockModalMeta"></div>
      </div>
      <button onclick="closeStockModal()" style="background:var(--surface);border:none;border-radius:8px;width:32px;height:32px;font-size:16px;cursor:pointer;font-family:inherit">✕</button>
    </div>
    <div id="stockAiContent">
      <div style="text-align:center;padding:32px;color:var(--text-muted)">⏳ AI 분석 중...</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const ACCOUNTS = [
  { id:'toss',    name:'토스증권',      type:'직투',     color:'#4F46E5', icon:'📱', bg:'#ede9fe', textColor:'#4F46E5' },
  { id:'samsung', name:'삼성증권 IRP',  type:'퇴직연금', color:'#1428A0', icon:'🏦', bg:'#dbeafe', textColor:'#1d4ed8' },
  { id:'namu',    name:'나무증권 ISA',  type:'절세계좌', color:'#059669', icon:'🌿', bg:'#d1fae5', textColor:'#059669' },
  { id:'mirae',   name:'미래에셋 CMA', type:'CMA',      color:'#dc2626', icon:'🔥', bg:'#fee2e2', textColor:'#dc2626' },
];

const SECTOR_COLORS = {
  '반도체':'#4F46E5','ETF':'#7c3aed','해외ETF':'#0ea5e9',
  '플랫폼':'#f59e0b','배터리':'#10b981','바이오':'#ec4899','기타':'#6b7280'
};

function load(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
}
function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

let holdings = load('holdings', []);
let currentTab = 'overview';
let aiOpinion = null;
const stockAiCache = {};

// ── CALC ──
function pnl(h) {
  const invested = h.qty * h.avgPrice;
  const current  = h.qty * h.currentPrice;
  return { invested, current, pnl: current - invested, pct: ((current - invested) / invested) * 100 };
}
function fmt(n) { return Number(n).toLocaleString('ko-KR'); }
function pctStr(p) { return (p >= 0 ? '+' : '') + p.toFixed(2) + '%'; }
function dupTickers() {
  const map = {};
  holdings.forEach(h => { map[h.ticker] = (map[h.ticker]||0) + 1; });
  return Object.entries(map).filter(([,v]) => v > 1).map(([t]) => t);
}

// ── TAB ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  ['overview','accounts','holdings','ai'].forEach(t => {
    document.getElementById('page-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.getElementById('fabBtn').style.display = tab === 'holdings' ? 'flex' : 'none';
  render(tab);
}

// ── RENDER ──
function renderAll() {
  updateDupBadge();
  render(currentTab);
}

function updateDupBadge() {
  const dups = dupTickers();
  const badge = document.getElementById('dupBadge');
  if (dups.length > 0) { badge.textContent = `⚠ 중복 ${dups.length}건`; badge.style.display=''; }
  else { badge.style.display = 'none'; }
}

function render(tab) {
  const el = document.getElementById('page-'+tab);
  if (tab === 'overview') el.innerHTML = renderOverview();
  else if (tab === 'accounts') el.innerHTML = renderAccounts();
  else if (tab === 'holdings') el.innerHTML = renderHoldings();
  else if (tab === 'ai') renderAi(el);
  bindHoldingClicks();
}

function renderOverview() {
  const totalInv = holdings.reduce((s,h) => s + pnl(h).invested, 0);
  const totalCur = holdings.reduce((s,h) => s + pnl(h).current, 0);
  const totalPnl = totalCur - totalInv;
  const totalPct = (totalPnl / totalInv) * 100;
  const dups = dupTickers();

  // sector map
  const sectors = {};
  holdings.forEach(h => { sectors[h.sector] = (sectors[h.sector]||0) + pnl(h).current; });
  const sectorEntries = Object.entries(sectors).sort((a,b)=>b[1]-a[1]);

  // account summary
  const acctRows = ACCOUNTS.map(acc => {
    const hs = holdings.filter(h => h.accountId === acc.id);
    const inv = hs.reduce((s,h)=>s+pnl(h).invested,0);
    const cur = hs.reduce((s,h)=>s+pnl(h).current,0);
    return { ...acc, hs, inv, cur, p: cur-inv };
  });

  return `
    <!-- Total card -->
    <div class="total-card">
      <div class="total-label">총 평가금액</div>
      <div class="total-amount">${fmt(totalCur)}<sup>원</sup></div>
      <div class="total-meta">
        <span>투자원금 ${fmt(totalInv)}원</span>
        <span class="total-pnl" style="color:${totalPnl>=0?'#a7f3d0':'#fca5a5'}">
          ${totalPnl>=0?'▲':'▼'} ${fmt(Math.abs(totalPnl))}원 (${pctStr(totalPct)})
        </span>
      </div>
    </div>

    <div class="section-label" style="margin-top:20px">계좌별 현황</div>
    <div class="account-grid">
      ${acctRows.map(acc => `
        <div class="account-card" onclick="switchTab('accounts')">
          <div class="account-icon">${acc.icon}</div>
          <div class="account-name">${acc.name}</div>
          <div class="account-type" style="background:${acc.bg};color:${acc.textColor}">${acc.type}</div>
          <div class="account-amount">${(acc.cur/10000).toFixed(0)}<span style="font-size:11px;font-weight:500;color:var(--text-muted)">만원</span></div>
          <div class="account-pnl ${acc.p>=0?'up':'down'}">${acc.p>=0?'+':''}{${(acc.p/10000).toFixed(0)}}만원</div>
          <div class="account-count">${acc.hs.length}개 종목</div>
        </div>
      `).join('')}
    </div>

    <div class="section-label">섹터 비중</div>
    <div class="sector-card">
      ${sectorEntries.map(([s, v]) => {
        const pct = (v/totalCur*100);
        const c = SECTOR_COLORS[s] || '#6b7280';
        return `
          <div class="sector-row">
            <div class="sector-meta">
              <span class="sector-name">${s}</span>
              <span class="sector-pct" style="color:${c}">${pct.toFixed(1)}%</span>
            </div>
            <div class="sector-bar-bg">
              <div class="sector-bar-fill" style="width:${pct}%;background:${c}"></div>
            </div>
          </div>`;
      }).join('')}
    </div>

    ${dups.length > 0 ? `
      <div class="section-label">중복 보유 주의</div>
      <div class="dup-card">
        <div class="dup-title">⚠ 중복 보유 종목</div>
        ${dups.map(ticker => {
          const hs = holdings.filter(h => h.ticker === ticker);
          return `
            <div class="dup-item">
              <div class="dup-item-name">${hs[0].name} (${ticker})</div>
              ${hs.map(h => {
                const acc = ACCOUNTS.find(a=>a.id===h.accountId);
                return `<div class="dup-row"><span style="color:${acc.color};font-weight:700">${acc.name}</span><span>${h.qty}주 · 평단 ${fmt(h.avgPrice)}원</span></div>`;
              }).join('')}
            </div>`;
        }).join('')}
      </div>
    ` : ''}
  `;
}

function renderAccounts() {
  return ACCOUNTS.map(acc => {
    const hs = holdings.filter(h => h.accountId === acc.id);
    const cur = hs.reduce((s,h)=>s+pnl(h).current,0);
    const p   = hs.reduce((s,h)=>s+pnl(h).pnl,0);
    return `
      <div class="acct-detail-card">
        <div class="acct-detail-header">
          <div class="acct-detail-icon" style="background:${acc.bg}">${acc.icon}</div>
          <div>
            <div class="acct-detail-name">${acc.name}</div>
            <div class="acct-detail-type" style="color:${acc.textColor}">${acc.type}</div>
          </div>
          <div class="acct-detail-amounts">
            <div class="acct-detail-cur">${fmt(cur)}원</div>
            <div class="acct-detail-pnl ${p>=0?'up':'down'}">${p>=0?'+':''}${fmt(p)}원</div>
          </div>
        </div>
        ${hs.length === 0 ? `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">보유 종목 없음</div></div>` : ''}
        ${hs.map(h => {
          const r = pnl(h);
          return `
            <div class="acct-holding-row" data-hid="${h.id}">
              <div>
                <div class="acct-h-name">${h.name}</div>
                <div class="acct-h-sub">${h.qty}주 · 평단 ${fmt(h.avgPrice)}원</div>
              </div>
              <div>
                <div class="acct-h-pnl ${r.pct>=0?'up':'down'}">${r.pct>=0?'▲':'▼'} ${Math.abs(r.pct).toFixed(1)}%</div>
                <div class="acct-h-cur">${fmt(r.current)}원</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

function renderHoldings() {
  const dups = dupTickers();
  if (holdings.length === 0) {
    return `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">보유 종목이 없어요.<br>+ 버튼으로 종목을 추가해보세요.</div></div>`;
  }
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-size:13px;color:var(--text-sub)">총 ${holdings.length}개 종목</span>
    </div>
    ${holdings.map(h => {
      const r = pnl(h);
      const acc = ACCOUNTS.find(a=>a.id===h.accountId);
      const isDup = dups.includes(h.ticker);
      return `
        <div class="holding-item ${isDup?'dup':''}" data-hid="${h.id}">
          ${isDup ? `<div class="holding-dup-badge">중복</div>` : ''}
          <div class="holding-top">
            <div>
              <div class="holding-name">${h.name}</div>
              <div class="holding-ticker">${h.ticker}</div>
            </div>
            <div class="holding-pnl-pct ${r.pct>=0?'up':'down'}">${r.pct>=0?'▲':'▼'} ${Math.abs(r.pct).toFixed(1)}%</div>
          </div>
          <div class="holding-tags">
            <span class="holding-tag" style="background:${acc.bg};color:${acc.textColor}">${acc.icon} ${acc.name}</span>
            <span class="holding-tag" style="background:var(--surface2);color:var(--text-sub)">${h.sector}</span>
          </div>
          <div class="holding-bottom">
            <span>${h.qty}주 · 평단 ${fmt(h.avgPrice)}원</span>
            <span class="holding-amount">${fmt(r.current)}원</span>
          </div>
          <button class="del-btn" onclick="event.stopPropagation();deleteHolding(${h.id})">삭제</button>
          <div style="height:28px"></div>
        </div>`;
    }).join('')}`;
}

function renderAi(el) {
  const bannerHtml = `
    <div class="ai-banner">
      <span class="ai-emoji">🤖</span>
      <div class="ai-banner-title">AI 포트폴리오 분석</div>
      <div class="ai-banner-sub">현재 시장 상황과 포트폴리오를 분석해<br>맞춤형 투자 의견을 제공합니다</div>
      <button class="ai-start-btn" id="aiStartBtn" onclick="fetchAiOpinion()">
        <span>✨</span> AI 분석 시작
      </button>
    </div>`;

  if (!aiOpinion) { el.innerHTML = bannerHtml; return; }

  const actionColor = {'매수':'#10b981','정리':'#ef4444','유지':'#f59e0b','일부매도':'#f59e0b','전량매도':'#ef4444','보유':'#10b981'};

  el.innerHTML = `
    ${bannerHtml}
    <div class="ai-section">
      <div class="ai-card">
        <div class="ai-card-label">📊 종합 평가</div>
        <div class="ai-card-text">${aiOpinion.summary}</div>
      </div>
    </div>
    <div class="ai-section">
      <div class="ai-card">
        <div class="ai-card-label">🌍 시장 환경</div>
        <div class="ai-card-text">${aiOpinion.marketView}</div>
      </div>
    </div>
    ${aiOpinion.duplicateWarning ? `
      <div class="ai-section">
        <div class="ai-card" style="background:#fff8f8;border-color:#fecaca">
          <div class="ai-card-label" style="color:var(--red)">⚠ 중복 보유</div>
          <div class="ai-card-text">${aiOpinion.duplicateWarning}</div>
        </div>
      </div>` : ''}
    <div class="section-label">투자 액션 추천</div>
    ${(aiOpinion.actions||[]).map(a => `
      <div class="action-row">
        <div class="action-top">
          <span class="action-chip" style="background:${actionColor[a.type]||'#6b7280'}">${a.type}</span>
          <span class="action-target">${a.target}</span>
        </div>
        <div class="action-reason">${a.reason}</div>
      </div>`).join('')}
    ${(aiOpinion.risks||[]).length > 0 ? `
      <div class="section-label">🚨 주요 리스크</div>
      <div class="ai-card">
        ${aiOpinion.risks.map(r => `<div class="risk-row">• ${r}</div>`).join('')}
      </div>` : ''}
  `;
}

// ── AI FETCH ──
async function fetchAiOpinion() {
  const btn = document.getElementById('aiStartBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ 분석 중...'; }

  const summary = holdings.map(h => {
    const r = pnl(h);
    const acc = ACCOUNTS.find(a=>a.id===h.accountId);
    return `${h.name}(${h.ticker}) - ${acc.name} - 수량:${h.qty} 평단:${fmt(h.avgPrice)}원 현재가:${fmt(h.currentPrice)}원 손익:${r.pct.toFixed(1)}%`;
  }).join('\n');

  const dups = dupTickers().map(t => holdings.find(h=>h.ticker===t)?.name + `(${t})`).join(', ');
  const totalInv = holdings.reduce((s,h)=>s+pnl(h).invested,0);
  const totalCur = holdings.reduce((s,h)=>s+pnl(h).current,0);
  const totalPct = ((totalCur-totalInv)/totalInv*100);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `당신은 국내 주식시장과 거시경제에 정통한 투자 전문가입니다. 포트폴리오를 분석하고 간결하고 실용적인 투자 의견을 한국어로 제공합니다. 반드시 다음 JSON 형식으로만 응답하세요(마크다운 없이):
{"summary":"전체 포트폴리오 한줄 평가","risks":["리스크1","리스크2"],"actions":[{"type":"정리","target":"종목명","reason":"이유"},{"type":"매수","target":"종목명/섹터","reason":"이유"}],"duplicateWarning":"중복 보유 관련 코멘트","marketView":"현재 시장 환경 한줄 평"}`,
        messages: [{ role: 'user', content: `포트폴리오 현황:\n${summary}\n\n중복 보유: ${dups||'없음'}\n총 투자금: ${fmt(totalInv)}원 / 총 평가금: ${fmt(totalCur)}원 / 총 손익: ${pctStr(totalPct)}` }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(c=>c.type==='text')?.text || '{}';
    aiOpinion = JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) {
    aiOpinion = { summary:'분석 중 오류가 발생했습니다. 다시 시도해주세요.', risks:[], actions:[], duplicateWarning:'', marketView:'' };
  }
  renderAi(document.getElementById('page-ai'));
}

// ── STOCK AI ──
async function fetchStockAi(holding) {
  const key = holding.ticker + holding.currentPrice;
  if (stockAiCache[key]) { showStockAiResult(stockAiCache[key]); return; }
  const r = pnl(holding);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: `투자 전문가. 개별 종목 의견을 JSON으로만 답하라:
{"action":"매수|보유|일부매도|전량매도","confidence":70,"reason":"이유 2문장","shortTerm":"단기전망","risk":"주요리스크"}`,
        messages: [{ role:'user', content:`종목:${holding.name}(${holding.ticker}), 섹터:${holding.sector}, 평단:${fmt(holding.avgPrice)}원, 현재가:${fmt(holding.currentPrice)}원, 손익:${r.pct.toFixed(1)}%` }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(c=>c.type==='text')?.text || '{}';
    const result = JSON.parse(text.replace(/```json|```/g,'').trim());
    stockAiCache[key] = result;
    showStockAiResult(result);
  } catch {
    showStockAiResult({ action:'오류', confidence:0, reason:'분석 실패. 다시 시도해주세요.', shortTerm:'-', risk:'-' });
  }
}

function showStockAiResult(op) {
  const actionColor = {'매수':'#10b981','보유':'#4F46E5','일부매도':'#f59e0b','전량매도':'#ef4444','오류':'#6b7280'};
  const infoColors = { bg:'#f5f3ff', color:'#4F46E5', riskBg:'#fff8f8', riskColor:'#ef4444' };
  document.getElementById('stockAiContent').innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:16px">
      <span class="stock-action-pill" style="background:${actionColor[op.action]||'#6b7280'}">${op.action}</span>
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">확신도 ${op.confidence}%</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="confidence-bar-bg"><div class="confidence-bar-fill" style="width:${op.confidence}%"></div></div>
        </div>
      </div>
    </div>
    <div style="font-size:13px;line-height:1.7;color:var(--text);margin-bottom:4px">${op.reason}</div>
    <div class="stock-info-grid">
      <div class="stock-info-box" style="background:${infoColors.bg}">
        <div class="stock-info-box-label" style="color:${infoColors.color}">📈 단기 전망</div>
        <div class="stock-info-box-text">${op.shortTerm}</div>
      </div>
      <div class="stock-info-box" style="background:${infoColors.riskBg}">
        <div class="stock-info-box-label" style="color:${infoColors.riskColor}">🚨 주요 리스크</div>
        <div class="stock-info-box-text">${op.risk}</div>
      </div>
    </div>`;
}

function openStockModal(holding) {
  const acc = ACCOUNTS.find(a=>a.id===holding.accountId);
  document.getElementById('stockModalName').textContent = holding.name;
  document.getElementById('stockModalMeta').textContent = `${holding.ticker} · ${holding.sector} · ${acc.name}`;
  document.getElementById('stockAiContent').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-muted)">⏳ AI 분석 중...</div>';
  document.getElementById('stockModal').classList.add('open');
  fetchStockAi(holding);
}
function closeStockModal() {
  document.getElementById('stockModal').classList.remove('open');
}

// ── HOLDING CLICKS ──
function bindHoldingClicks() {
  document.querySelectorAll('[data-hid]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('del-btn')) return;
      const hid = parseInt(el.dataset.hid);
      const h = holdings.find(h => h.id === hid);
      if (h) openStockModal(h);
    });
  });
}

// ── DELETE ──
function deleteHolding(id) {
  holdings = holdings.filter(h => h.id !== id);
  save('holdings', holdings);
  renderAll();
  showToast('종목이 삭제되었습니다');
}

// ── ADD MODAL ──
document.getElementById('fabBtn').addEventListener('click', () => {
  document.getElementById('addModal').classList.add('open');
});
document.getElementById('addCancel').addEventListener('click', () => {
  document.getElementById('addModal').classList.remove('open');
});
document.getElementById('addModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('addModal')) document.getElementById('addModal').classList.remove('open');
});
document.getElementById('stockModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('stockModal')) closeStockModal();
});
document.getElementById('addConfirm').addEventListener('click', () => {
  const ticker  = document.getElementById('inp-ticker').value.trim();
  const name    = document.getElementById('inp-name').value.trim();
  const sector  = document.getElementById('inp-sector').value.trim() || '기타';
  const qty     = parseFloat(document.getElementById('inp-qty').value);
  const avg     = parseFloat(document.getElementById('inp-avg').value);
  const cur     = parseFloat(document.getElementById('inp-cur').value);
  const acct    = document.getElementById('inp-account').value;
  if (!ticker || !name || !qty || !avg || !cur) { showToast('모든 항목을 입력해주세요'); return; }
  holdings.push({ id: Date.now(), ticker, name, sector, qty, avgPrice: avg, currentPrice: cur, accountId: acct });
  save('holdings', holdings);
  ['inp-ticker','inp-name','inp-sector','inp-qty','inp-avg','inp-cur'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addModal').classList.remove('open');
  renderAll();
  showToast(`${name} 추가 완료!`);
});

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── NAV ──
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── INIT ──
document.getElementById('fabBtn').style.display = 'none';
renderAll();

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
